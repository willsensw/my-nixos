# --- Font Configuration ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# --- Window Layout ---
background_opacity   0.85
window_padding_width 10
window_margin_width  0

# --- Monochrome & Deep Blue Theme ---
foreground           #ffffff
background           #0a0a0a

# --- Border & Glow ---
# Matches the Niri "Deep Sky Blue" border
active_border_color   #5294e2
inactive_border_color #333333
window_border_width   1.5pt

# --- The "Cyberpunk" Blue Cursor ---
cursor                #5294e2
cursor_text_color     #000000

# Cursor Trail (Kept the same, just re-colored implicitly by cursor color)
cursor_trail 1
cursor_trail_decay 0.1 0.4

# --- Tab Bar (Matches Waybar Style) ---
tab_bar_style         fade
active_tab_foreground #000000
active_tab_background #5294e2
inactive_tab_foreground #a0a0a0
inactive_tab_background #1a1b26

# --- Performance & Behavior ---
hide_window_decorations yes
confirm_os_window_close 0
sync_to_monitor yes

# --- Color Palette (Optional: Soft Blue Tints) ---
# Overrides standard blue to match your theme
color4  #5294e2
color12 #5294e2
