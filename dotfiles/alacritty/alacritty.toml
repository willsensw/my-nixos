[window]
# Matches your transparent XFCE aesthetic
opacity = 0.85
dynamic_padding = true

[window.padding]
x = 12
y = 12

[font]
size = 11.0

[font.normal]
family = "Inter"
style = "Regular"

[font.bold]
family = "Inter"
style = "Bold"

[font.italic]
family = "Inter"
style = "Italic"

# Orchis Dark / Sweet aesthetic color palette
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"