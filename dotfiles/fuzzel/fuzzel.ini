# ==============================================================================
# FUZZEL CONFIGURATION - COMPACT & MINIMAL (SMALLER TEXT)
# ==============================================================================

[main]
# Reduced size from 14 -> 11. This automatically shrinks the icons too.
font=JetBrainsMono Nerd Font:weight=bold:size=11

dpi-aware=auto
icon-theme=Adwaita
terminal=kitty -e
prompt="➜  "
layer=overlay
anchor=center

# --- Tighter Dimensions ---
lines=8             
width=30            # Narrower to match small text (was 35)
tabs=4
horizontal-pad=15   # Very tight sides (was 20)
vertical-pad=8      # Tight top/bottom (was 10)
inner-pad=4         # Minimal gap between icon and text (was 5)

# --- Spacing ---
# This forces the rows to be slightly tighter if the auto-scaling is too loose
line-height=18      

# --- The "Cyberpunk" Blue Styling (Unchanged) ---
[colors]
background=0f0f0fe6
text=ffffffff
match=5294e2ff
selection=5294e2ff
selection-text=000000ff
border=5294e2ff

[border]
width=2             
radius=8            # Slightly smaller radius to match the smaller window

[dmenu]
mode=text
exit-immediately-if-empty=yes
